<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Tracker — 読書管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0f14;--surface:#111820;--surface2:#182030;--surface3:#1e2a3a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#e8edf2;--muted:#6a7a8a;--muted2:#3a4a5a;
  --accent:#5b9bd5;--accent2:#7ec8a0;--accent3:#c8a96e;
  --danger:#cf7070;--want:#a07ed0;--reading:#5b9bd5;--done:#7ec8a0;
  --fd:'Cormorant Garamond',serif;--fb:'DM Sans',sans-serif;
  --r:12px;--rs:8px;
}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;}

/* LAYOUT */
.app{display:flex;flex-direction:column;min-height:100vh;}
.header{padding:1.25rem 2rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:100;gap:12px;flex-wrap:wrap;}
.logo{font-family:var(--fd);font-size:1.5rem;letter-spacing:.04em;flex-shrink:0;display:flex;align-items:baseline;gap:6px;}
.logo-book{color:var(--text);font-weight:600;}
.logo-tracker{color:var(--accent);font-weight:400;font-style:italic;}
.nav-tabs{display:flex;gap:3px;background:var(--surface);border-radius:100px;padding:4px;border:1px solid var(--border);}
.nav-tab{padding:5px 14px;border-radius:100px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:var(--fb);font-size:13px;transition:all .18s;white-space:nowrap;}
.nav-tab.active{background:var(--surface3);color:var(--text);font-weight:500;}
.nav-tab:hover:not(.active){color:var(--text);}
.main{flex:1;padding:1.75rem 2rem;max-width:1020px;margin:0 auto;width:100%;}
.section{display:none;}.section.active{display:block;}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center;}
.search-input{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:var(--fb);font-size:13px;padding:7px 12px;outline:none;width:220px;transition:border-color .18s;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}
.sort-select{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);color:var(--muted);font-family:var(--fb);font-size:13px;padding:7px 10px;outline:none;cursor:pointer;}
.sort-select option{background:var(--surface2);}

/* FILTER PILLS */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center;}
.pill{padding:4px 13px;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .18s;background:var(--surface2);color:var(--muted);border-color:var(--border);}
.pill:hover,.pill.active{color:var(--text);background:var(--surface3);border-color:var(--border2);}
.pill.p-reading{color:var(--reading);background:rgba(126,159,208,.1);border-color:rgba(126,159,208,.2);}
.pill.p-reading:hover,.pill.p-reading.active{background:rgba(126,159,208,.22);}
.pill.p-want{color:var(--want);background:rgba(160,126,208,.1);border-color:rgba(160,126,208,.2);}
.pill.p-want:hover,.pill.p-want.active{background:rgba(160,126,208,.22);}
.pill.p-done{color:var(--done);background:rgba(126,200,160,.1);border-color:rgba(126,200,160,.2);}
.pill.p-done:hover,.pill.p-done.active{background:rgba(126,200,160,.22);}
.tag-pill{padding:3px 10px;border-radius:100px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .18s;}
.tag-pill:hover,.tag-pill.active{border-color:var(--accent);color:var(--accent);}

/* BOOK GRID */
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px;}
.book-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s;}
.book-card:hover{border-color:var(--border2);transform:translateY(-3px);}
.book-cover{height:195px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.book-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.cover-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:.9rem;text-align:center;font-family:var(--fd);font-size:.82rem;line-height:1.35;}
.status-dot{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;z-index:2;box-shadow:0 0 0 2px rgba(0,0,0,.5);}
.status-dot.reading{background:var(--reading);}
.status-dot.want{background:var(--want);}
.status-dot.done{background:var(--done);}
.book-info{padding:9px 11px 11px;}
.book-title{font-weight:500;font-size:12.5px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.book-author{font-size:11px;color:var(--muted);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.book-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.btag{font-size:10px;padding:1px 7px;border-radius:100px;background:var(--surface3);color:var(--muted);border:1px solid var(--border);}
.stars{display:flex;gap:1px;}
.star{font-size:11px;}.star.f{color:var(--accent);}.star.e{color:var(--surface3);}
.prog-wrap{margin-top:7px;}
.prog-bar{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--reading);border-radius:2px;}
.prog-lbl{font-size:10px;color:var(--muted);margin-top:2px;}

/* STATS */
.goal-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;}
.goal-label{font-size:12px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em;}
.goal-value{font-family:var(--fd);font-size:1.6rem;}
.goal-bar-wrap{flex:1;min-width:160px;}
.goal-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:6px;}
.goal-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .6s;}
.goal-pct{font-size:11px;color:var(--muted);margin-top:4px;}
.goal-edit{display:flex;gap:8px;align-items:center;}
.goal-input{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:var(--fb);font-size:14px;padding:6px 10px;width:70px;outline:none;}
.goal-input:focus{border-color:var(--accent);}
.goal-btn{padding:6px 14px;background:var(--accent);color:#0d0d0f;border:none;border-radius:var(--rs);font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;transition:opacity .18s;}
.goal-btn:hover{opacity:.85;}
.stats-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1.1rem;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.sc-gold::after{background:var(--accent);}.sc-blue::after{background:var(--accent2);}.sc-green::after{background:var(--accent3);}.sc-purple::after{background:var(--want);}
.slabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.svalue{font-family:var(--fd);font-size:1.7rem;}
.ssub{font-size:10px;color:var(--muted);margin-top:1px;}
.chart-area{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem;margin-bottom:1.5rem;}
.chart-title{font-size:12px;font-weight:500;margin-bottom:1.1rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
.bars{display:flex;align-items:flex-end;gap:8px;height:110px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end;}
.bar-fill{width:100%;border-radius:4px 4px 0 0;opacity:.7;transition:opacity .2s;min-height:4px;}
.bar-fill:hover{opacity:1;}
.bar-lbl{font-size:10px;color:var(--muted);text-align:center;}

/* ADD FORM */
.add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.75rem;max-width:580px;}
.ftitle{font-family:var(--fd);font-size:1.25rem;margin-bottom:1.4rem;}
.fg{margin-bottom:1.1rem;}
.fl{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;}
.fi,.fs,.fta{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:var(--fb);font-size:14px;padding:9px 13px;outline:none;transition:border-color .18s;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--accent);}
.fta{resize:vertical;min-height:70px;}
.fs option{background:var(--surface2);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.isbn-row{display:flex;gap:8px;}
.isbn-row .fi{flex:1;}
.srch-btn{padding:9px 14px;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:var(--fb);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .18s;}
.srch-btn:hover{border-color:var(--accent);}
.srch-btn:disabled{opacity:.45;cursor:default;}
.cprev{display:none;margin-top:9px;align-items:center;gap:11px;background:var(--surface2);border-radius:var(--rs);padding:9px;}
.cprev.show{display:flex;}
.cprev img{width:46px;height:62px;object-fit:cover;border-radius:4px;border:1px solid var(--border2);flex-shrink:0;}
.cprev-title{font-size:13px;font-weight:500;}
.cprev-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.star-input{display:flex;gap:3px;}
.star-btn{font-size:20px;cursor:pointer;background:none;border:none;padding:0;transition:transform .1s;color:var(--surface3);}
.star-btn.active{color:var(--accent);}
.star-btn:hover{transform:scale(1.2);}
.tag-input-wrap{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.tag-input-wrap .fi{flex:1;min-width:120px;}
.tag-add-btn{padding:9px 13px;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:var(--fb);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .18s;}
.tag-add-btn:hover{border-color:var(--accent);}
.pending-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.ptag{font-size:12px;padding:2px 9px;border-radius:100px;background:rgba(200,169,110,.12);color:var(--accent);border:1px solid rgba(200,169,110,.25);display:flex;align-items:center;gap:5px;}
.ptag-x{cursor:pointer;opacity:.6;font-size:11px;}
.ptag-x:hover{opacity:1;}
.submit-btn{width:100%;padding:11px;background:var(--accent);color:#0d0d0f;border:none;border-radius:var(--rs);font-family:var(--fb);font-size:14px;font-weight:500;cursor:pointer;transition:opacity .18s;margin-top:.4rem;}
.submit-btn:hover{opacity:.85;}
.success-msg{display:none;background:rgba(126,200,160,.1);border:1px solid rgba(126,200,160,.28);color:var(--done);border-radius:var(--rs);padding:9px 13px;font-size:13px;margin-bottom:1.1rem;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:1.75rem;width:92%;max-width:520px;position:relative;max-height:90vh;overflow-y:auto;}
.modal-close{position:absolute;top:13px;right:15px;background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;}
.modal-top{display:flex;gap:1.2rem;margin-bottom:1rem;}
.modal-cimg{width:80px;height:112px;border-radius:6px;object-fit:cover;border:1px solid var(--border2);flex-shrink:0;}
.modal-cph{width:80px;height:112px;border-radius:6px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:.62rem;text-align:center;padding:7px;flex-shrink:0;}
.modal-btitle{font-family:var(--fd);font-size:1.1rem;margin-bottom:2px;line-height:1.3;}
.modal-author{color:var(--muted);font-size:13px;margin-bottom:8px;}
.modal-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:7px;}
.mi{font-size:12px;color:var(--muted);}
.mv{color:var(--text);font-weight:500;}
.sbadge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:500;}
.sb-reading{background:rgba(126,159,208,.14);color:var(--reading);}
.sb-want{background:rgba(160,126,208,.14);color:var(--want);}
.sb-done{background:rgba(126,200,160,.14);color:var(--done);}

/* MODAL TABS */
.mtabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin:1rem 0 1rem;}
.mtab{padding:5px 12px;border:none;background:transparent;color:var(--muted);font-family:var(--fb);font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .18s;}
.mtab.active{color:var(--accent);border-bottom-color:var(--accent);}
.mtab-panel{display:none;}.mtab-panel.active{display:block;}

/* HIGHLIGHTS */
.highlight-list{display:flex;flex-direction:column;gap:9px;margin-bottom:.9rem;}
.hl-item{background:var(--surface2);border-radius:var(--rs);padding:10px 13px;border-left:3px solid var(--accent);position:relative;}
.hl-text{font-size:13px;line-height:1.6;font-style:italic;color:var(--text);}
.hl-meta{font-size:11px;color:var(--muted);margin-top:4px;}
.hl-del{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--muted2);cursor:pointer;font-size:13px;}
.hl-del:hover{color:var(--danger);}
.hl-add{display:flex;flex-direction:column;gap:7px;}
.hl-add .fta{min-height:60px;font-size:13px;}
.hl-add-row{display:flex;gap:7px;}
.hl-add-row .fi{flex:1;font-size:13px;padding:7px 11px;}
.hl-submit{padding:7px 16px;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:var(--fb);font-size:13px;cursor:pointer;transition:all .18s;}
.hl-submit:hover{border-color:var(--accent);color:var(--accent);}

.delete-btn{margin-top:1.4rem;width:100%;padding:8px;background:transparent;border:1px solid rgba(207,112,112,.28);color:var(--danger);border-radius:var(--rs);font-family:var(--fb);font-size:13px;cursor:pointer;transition:background .18s;}
.delete-btn:hover{background:rgba(207,112,112,.08);}

.empty-state{text-align:center;padding:3.5rem 2rem;color:var(--muted);}
.empty-icon{font-size:2.2rem;margin-bottom:.6rem;}

/* GENRE BADGES */
.genre-badge{display:inline-block;font-size:10px;font-weight:500;padding:1px 8px;border-radius:100px;margin-bottom:5px;}
.gb-小説{background:rgba(91,155,213,.18);color:#5b9bd5;}
.gb-ビジネス{background:rgba(200,169,110,.18);color:#c8a96e;}
.gb-自己啓発{background:rgba(126,200,160,.18);color:#7ec8a0;}
.gb-技術{background:rgba(160,126,208,.18);color:#a07ed0;}
.gb-歴史{background:rgba(207,144,112,.18);color:#cf9070;}
.gb-その他{background:rgba(120,120,120,.18);color:#999;}

/* TIMELINE */
.tl-toolbar{display:flex;gap:8px;margin-bottom:1.25rem;align-items:center;flex-wrap:wrap;}
.tl-mode-btn{padding:5px 14px;border-radius:100px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);font-family:var(--fb);font-size:13px;cursor:pointer;transition:all .18s;}
.tl-mode-btn.active{background:var(--surface3);color:var(--text);border-color:var(--border2);}
.tl-year-select{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);color:var(--muted);font-family:var(--fb);font-size:13px;padding:6px 10px;outline:none;cursor:pointer;}
.tl-year-select option{background:var(--surface2);}
.tl-group{margin-bottom:2rem;}
.tl-group-header{display:flex;align-items:center;gap:12px;margin-bottom:.9rem;}
.tl-group-title{font-family:var(--fd);font-size:1.05rem;color:var(--text);}
.tl-group-count{font-size:12px;color:var(--muted);background:var(--surface2);border-radius:100px;padding:2px 10px;border:1px solid var(--border);}
.tl-list{display:flex;flex-direction:column;gap:8px;}
.tl-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:border-color .18s;}
.tl-item:hover{border-color:var(--border2);}
.tl-thumb{width:36px;height:50px;border-radius:4px;object-fit:cover;border:1px solid var(--border2);flex-shrink:0;}
.tl-thumb-ph{width:36px;height:50px;border-radius:4px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:.45rem;text-align:center;padding:4px;flex-shrink:0;}
.tl-info{flex:1;min-width:0;}
.tl-title{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-author{font-size:11px;color:var(--muted);margin-top:1px;}
.tl-meta{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;align-items:center;}
.tl-date{font-size:11px;color:var(--muted);}
.tl-pages{font-size:11px;color:var(--muted);}
.tl-stars{display:flex;gap:1px;}
.tl-star{font-size:10px;}.tl-star.f{color:var(--accent);}.tl-star.e{color:var(--surface3);}
.tl-empty{text-align:center;padding:3rem 2rem;color:var(--muted);font-size:14px;}

/* DATES */
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.fi[type="date"]{color-scheme:dark;}

@media(max-width:640px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .header{padding:1rem;flex-direction:column;gap:10px;}
  .main{padding:1rem;}
  .book-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
  .frow,.date-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo"><span class="logo-book">Book</span> <span class="logo-tracker">Tracker</span></div>
    <span id="sync-indicator" style="font-size:11px;color:var(--muted);"></span>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showSection('library')">本棚</button>
      <button class="nav-tab" onclick="showSection('timeline')">履歴</button>
      <button class="nav-tab" onclick="showSection('stats')">統計</button>
      <button class="nav-tab" onclick="showSection('add')">追加</button>
    </div>
  </div>

  <div class="main">
    <!-- LIBRARY -->
    <div class="section active" id="section-library">
      <div class="toolbar">
        <input class="search-input" id="search-q" placeholder="🔍 タイトル・著者を検索..." oninput="renderBooks()">
        <select class="sort-select" id="sort-sel" onchange="renderBooks()">
          <option value="added">追加順</option>
          <option value="title">タイトル順</option>
          <option value="rating">評価順</option>
          <option value="pages">ページ数順</option>
          <option value="date_done">読了日順</option>
        </select>
      </div>
      <div class="filter-row" id="status-filter">
        <button class="pill active" data-f="all" onclick="setStatusFilter('all',this)">すべて</button>
        <button class="pill p-reading" data-f="reading" onclick="setStatusFilter('reading',this)">読中</button>
        <button class="pill p-want" data-f="want" onclick="setStatusFilter('want',this)">読みたい</button>
        <button class="pill p-done" data-f="done" onclick="setStatusFilter('done',this)">読了</button>
      </div>
      <div class="filter-row" id="tag-filter"></div>
      <div class="book-grid" id="book-grid"></div>
    </div>

    <!-- TIMELINE -->
    <div class="section" id="section-timeline">
      <div class="tl-toolbar">
        <button class="tl-mode-btn active" id="tl-month-btn" onclick="setTLMode('month')">月別</button>
        <button class="tl-mode-btn" id="tl-year-btn" onclick="setTLMode('year')">年別</button>
        <select class="tl-year-select" id="tl-year-sel" onchange="renderTimeline()"></select>
      </div>
      <div id="timeline-body"></div>
    </div>

    <!-- STATS -->
    <div class="section" id="section-stats">
      <div class="goal-banner">
        <div>
          <div class="goal-label">今年の目標</div>
          <div class="goal-value" id="goal-display">— 冊</div>
        </div>
        <div class="goal-bar-wrap">

// ── OPEN LIBRARY API（制限なし・無料）──
async function fetchCoverUrl(q){
  try{
    const isISBN=/^\d{10,13}$/.test(q.replace(/-/g,''));
    if(isISBN){
      // ISBN検索
      const isbn=q.replace(/-/g,'');
      const res=await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
      const data=await res.json();
      const key=`ISBN:${isbn}`;
      if(data[key]){
        const info=data[key];
        const cover=info.cover?info.cover.large||info.cover.medium||info.cover.small:null;
        return{
          cover,
          title:info.title,
          authors:info.authors?info.authors.map(a=>a.name):null,
          pages:info.number_of_pages
        };
      }
    } else {
      // タイトル検索
      const res=await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=1&lang=jpn`);
      const data=await res.json();
      if(data.docs&&data.docs[0]){
        const doc=data.docs[0];
        const coverId=doc.cover_i;
        const cover=coverId?`https://covers.openlibrary.org/b/id/${coverId}-L.jpg`:null;
        return{
          cover,
          title:doc.title,
          authors:doc.author_name||null,
          pages:doc.number_of_pages_median||null
        };
      }
      // 日本語で見つからなければ英語でも検索
      const res2=await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=1`);
      const data2=await res2.json();
      if(data2.docs&&data2.docs[0]){
        const doc=data2.docs[0];
        const coverId=doc.cover_i;
        const cover=coverId?`https://covers.openlibrary.org/b/id/${coverId}-L.jpg`:null;
        return{
          cover,
          title:doc.title,
          authors:doc.author_name||null,
          pages:doc.number_of_pages_median||null
        };
      }
    }
  }catch(e){console.warn('Open Library error:',e);}
  return null;
}

function getAllTags(){

// ── RENDER BOOKS ──
function renderBooks(){
  const grid=document.getElementById('book-grid');
  const q=(document.getElementById('search-q').value||'').toLowerCase();
  const sort=document.getElementById('sort-sel').value;
  let list=books.filter(b=>{
    if(currentFilter!=='all'&&b.status!==currentFilter)return false;
    if(currentTagFilter&&!b.tags.includes(currentTagFilter))return false;
    if(q&&!b.title.toLowerCase().includes(q)&&!b.author.toLowerCase().includes(q))return false;
    return true;
  });
  list=[...list].sort((a,b2)=>{
    if(sort==='title')return a.title.localeCompare(b2.title,'ja');
    if(sort==='rating')return b2.rating-a.rating;
    if(sort==='pages')return b2.pages-a.pages;
    if(sort==='date_done')return(b2.done||'').localeCompare(a.done||'');
    return b2.id-a.id;
  });
  if(!list.length){
    grid.innerHTML='<div class="empty-state"><div class="empty-icon">📚</div><div style="font-size:14px;color:var(--muted);">該当する本がありません。</div></div>';
    return;
  }
  grid.innerHTML=list.map(b=>`
    <div class="book-card" onclick="openModal(${b.id})">
      <div class="book-cover" style="background:${b.color}22;">
        ${b.cover?`<img src="${b.cover}" alt="${b.title}" onerror="this.style.display='none'" loading="lazy">`:`<div class="cover-ph" style="color:${b.color};">${b.title}</div>`}
        <div class="status-dot ${b.status}"></div>
      </div>
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author||'著者不明'}</div>
        <span class="genre-badge gb-${b.genre}">${b.genre}</span>
        ${b.tags.length?`<div class="book-tags">${b.tags.slice(0,2).map(t=>`<span class="btag">${t}</span>`).join('')}</div>`:''}
        ${b.rating>0?`<div class="stars">${[...Array(5)].map((_,i)=>`<span class="star ${i<b.rating?'f':'e'}">★</span>`).join('')}</div>`:''}
        ${b.status==='reading'?`<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${b.progress}%"></div></div><div class="prog-lbl">${b.progress}%</div></div>`:''}
      </div>
    </div>
  `).join('');
}

// ── STATS ──
function setGoal(){
  const v=parseInt(document.getElementById('goal-input').value);
  if(!v||v<1)return;
  goalCount=v;
  saveData();
  document.getElementById('goal-input').value='';
  updateGoal();
}
function updateGoal(){
  const doneCount=books.filter(b=>b.status==='done').length;
  if(!goalCount){
    document.getElementById('goal-display').textContent='未設定';
    document.getElementById('goal-pct').textContent='目標冊数を設定してください';
    document.getElementById('goal-fill').style.width='0%';
    document.getElementById('goal-progress-lbl').textContent=`読了 ${doneCount} 冊`;
    return;
  }
  const pct=Math.min(100,Math.round(doneCount/goalCount*100));
  document.getElementById('goal-display').textContent=goalCount+' 冊';
  document.getElementById('goal-progress-lbl').textContent=`読了 ${doneCount} / ${goalCount} 冊`;
  document.getElementById('goal-fill').style.width=pct+'%';
  document.getElementById('goal-pct').textContent=pct+'% 達成';
}
function renderStats(){
  updateGoal();
  const done=books.filter(b=>b.status==='done');
  const totalP=books.reduce((s,b)=>s+(b.pages||0),0);
  const totalC=books.reduce((s,b)=>s+(b.price||0),0);
  const rated=done.filter(b=>b.rating>0);
  const avg=rated.length?(rated.reduce((s,b)=>s+b.rating,0)/rated.length).toFixed(1):'—';
  document.getElementById('s-done').textContent=done.length;
  document.getElementById('s-pages').textContent=totalP.toLocaleString();
  document.getElementById('s-cost').textContent='¥'+totalC.toLocaleString();
  document.getElementById('s-rating').textContent=avg;
  const genres={};
  books.forEach(b=>{genres[b.genre]=(genres[b.genre]||0)+1;});
  const maxG=Math.max(...Object.values(genres),1);
  document.getElementById('c-genre').innerHTML=Object.entries(genres).map(([g,n],i)=>
    `<div class="bar-col"><div class="bar-fill" style="height:${Math.round(n/maxG*100)}%;background:${COLORS[i%COLORS.length]};"></div><div class="bar-lbl">${g}</div></div>`
  ).join('');
  const sL={done:'読了',reading:'読中',want:'読みたい'};
  const sC={done:'#8fcfb0',reading:'#7e9fd0',want:'#a07ed0'};
  const sCt={done:0,reading:0,want:0};
  books.forEach(b=>sCt[b.status]++);
  const maxS=Math.max(...Object.values(sCt),1);
  document.getElementById('c-status').innerHTML=Object.entries(sCt).map(([s,n])=>
    `<div class="bar-col"><div class="bar-fill" style="height:${Math.round(n/maxS*100)}%;background:${sC[s]};"></div><div class="bar-lbl">${sL[s]}</div></div>`
  ).join('');
}

    <div class="mtabs">
      <button class="mtab ${activeModalTab==='info'?'active':''}" onclick="switchMTab('info',${b.id})">詳細</button>
      <button class="mtab ${activeModalTab==='hl'?'active':''}" onclick="switchMTab('hl',${b.id})">メモ・ハイライト <span style="font-size:11px;color:var(--muted);">(${b.highlights.length})</span></button>
    </div>
    <div class="mtab-panel ${activeModalTab==='info'?'active':''}" id="mp-info">
      ${b.start||b.done?`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:.75rem;">
        ${b.start?`<div class="mi">開始日 <span class="mv">${b.start}</span></div>`:''}
        ${b.done?`<div class="mi">読了日 <span class="mv">${b.done}</span></div>`:''}
      </div>`:''}
      ${b.status==='reading'?`<div style="margin-bottom:.75rem;"><div class="prog-bar" style="height:5px;"><div class="prog-fill" style="width:${b.progress}%"></div></div><div class="prog-lbl">${b.progress}% 読了</div></div>`:''}
      ${b.review?`<div style="font-size:13px;color:var(--muted);font-style:italic;border-left:2px solid var(--border2);padding-left:12px;">${b.review}</div>`:'<div style="font-size:13px;color:var(--muted2);">レビューはまだありません。</div>'}
      <button class="delete-btn" onclick="deleteBook(${b.id})">この本を削除する</button>
    </div>
    <div class="mtab-panel ${activeModalTab==='hl'?'active':''}" id="mp-hl">
      ${hlHtml}
    </div>
  `;
}
function switchMTab(tab,id){
  activeModalTab=tab;
  const b=books.find(x=>x.id===id);if(b)renderModalContent(b);
}
function renderHighlights(b){
  const list=b.highlights.length
    ?`<div class="highlight-list">${b.highlights.map(h=>`
        <div class="hl-item">
          <div class="hl-text">${h.text}</div>
          ${h.page?`<div class="hl-meta">${h.page}</div>`:''}
          <button class="hl-del" onclick="deleteHighlight(${b.id},${h.id})">✕</button>
        </div>`).join('')}</div>`
    :`<div style="font-size:13px;color:var(--muted2);margin-bottom:.75rem;">ハイライトはまだありません。</div>`;
  return list+`
    <div class="hl-add">
      <textarea class="fta" id="hl-text-${b.id}" placeholder="印象に残った一文、メモ..."></textarea>
      <div class="hl-add-row">
        <input class="fi" id="hl-page-${b.id}" placeholder="ページ（例: p.42）">
        <button class="hl-submit" onclick="addHighlight(${b.id})">追加</button>
      </div>
    </div>`;
}
function addHighlight(bid){
  const b=books.find(x=>x.id===bid);if(!b)return;
  const text=document.getElementById('hl-text-'+bid).value.trim();
  if(!text)return;
  const page=document.getElementById('hl-page-'+bid).value.trim();
  b.highlights.push({id:nextHlId++,text,page});
  saveData();
  renderModalContent(b);
  activeModalTab='hl';
  renderModalContent(b);
}
function deleteHighlight(bid,hid){
  const b=books.find(x=>x.id===bid);if(!b)return;
  b.highlights=b.highlights.filter(h=>h.id!==hid);
  saveData();
  renderModalContent(b);
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function deleteBook(id){books=books.filter(b=>b.id!==id);saveData();closeModal();renderBooks();renderTagFilter();}

// ── RATING ──
function setRating(n){
  currentRating=n;
  document.querySelectorAll('#star-input .star-btn').forEach((b,i)=>b.classList.toggle('active',i<n));
}

// ── SECTION ──
function showSection(name){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('section-'+name).classList.add('active');
  const tabs=['library','timeline','stats','add'];
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===name));
  if(name==='stats')renderStats();
  if(name==='library'){renderBooks();renderTagFilter();}
  if(name==='timeline')renderTimeline();
}

// ── ADD BOOK ──
function addBook(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return;}
  books.unshift({
    id:nextId++,title,
    author:document.getElementById('f-author').value.trim(),
    cover:document.getElementById('f-cover').value.trim(),
    genre:document.getElementById('f-genre').value,
    status:document.getElementById('f-status').value,
    pages:parseInt(document.getElementById('f-pages').value)||0,
    price:parseInt(document.getElementById('f-price').value)||0,
    progress:parseInt(document.getElementById('f-progress').value)||0,
    rating:currentRating,
    review:document.getElementById('f-review').value.trim(),
    color:COLORS[Math.floor(Math.random()*COLORS.length)],
    tags:[...pendingTags],
    start:document.getElementById('f-start').value,
    done:document.getElementById('f-done').value,
    highlights:[],
  });
  ['f-title','f-author','f-cover','f-pages','f-price','f-progress','f-review','f-isbn','f-start','f-done'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-genre').value='小説';
  document.getElementById('f-status').value='want';
  document.getElementById('cprev').classList.remove('show');
  pendingTags=[];renderPendingTags();setRating(0);
  saveData();
  const msg=document.getElementById('success-msg');
  msg.style.display='block';
  setTimeout(()=>msg.style.display='none',2500);
}

// ── SAMPLE COVERS ──
async function loadSampleCovers(){
  // Only fetch covers for books that don't already have one
  const needsCover=books.filter(b=>!b.cover);
  if(!needsCover.length)return;
  const queries={
    '百年の孤独':'百年の孤独','ゼロ・トゥ・ワン':'ゼロ・トゥ・ワン',
    '嫌われる勇気':'嫌われる勇気','Clean Code':'Clean Code Robert Martin',
    'サピエンス全史':'サピエンス全史','ノルウェイの森':'ノルウェイの森 村上春樹',
    'アトミック・ハビット':'Atomic Habits James Clear',
  };
  let changed=false;
  for(const b of needsCover){
    const q=queries[b.title]||b.title;
    const r=await fetchCoverUrl(q);
    if(r&&r.cover){b.cover=r.cover;changed=true;}
    // Wait 800ms between requests to avoid rate limiting
    await new Promise(res=>setTimeout(res,800));
  }
  if(changed){saveData();renderBooks();}
}

// ── TIMELINE ──
let tlMode='month';
function setTLMode(m){
  tlMode=m;
  document.getElementById('tl-month-btn').classList.toggle('active',m==='month');
  document.getElementById('tl-year-btn').classList.toggle('active',m==='year');
  document.getElementById('tl-year-sel').style.display=m==='month'?'':'none';
  renderTimeline();
}

function renderTimeline(){
  // Build year selector
  const years=[...new Set(books.map(b=>(b.done||b.start||'').slice(0,4)).filter(y=>y))].sort((a,b)=>b-a);
  const sel=document.getElementById('tl-year-sel');
  const curYear=sel.value||years[0]||new Date().getFullYear().toString();
  sel.innerHTML=years.map(y=>`<option value="${y}" ${y===curYear?'selected':''}>${y}年</option>`).join('');
  sel.style.display=tlMode==='month'?'':'none';

  const body=document.getElementById('timeline-body');
  const MONTH_JA=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  if(tlMode==='month'){
    // Group by month within selected year
    const groups={};
    books.forEach(b=>{
      const d=b.done||b.start;
      if(!d||!d.startsWith(curYear))return;
      const m=d.slice(5,7);
      if(!groups[m])groups[m]=[];
      groups[m].push(b);
    });
    const months=Object.keys(groups).sort((a,b2)=>b2-a);
    if(!months.length){body.innerHTML=`<div class="tl-empty">${curYear}年の記録はありません。</div>`;return;}
    body.innerHTML=months.map(m=>{
      const list=groups[m];
      const pages=list.reduce((s,b)=>s+(b.pages||0),0);
      return`<div class="tl-group">
        <div class="tl-group-header">
          <div class="tl-group-title">${curYear}年 ${MONTH_JA[parseInt(m)-1]}</div>
          <span class="tl-group-count">${list.length}冊 · ${pages.toLocaleString()}p</span>
        </div>
        <div class="tl-list">${list.map(b=>tlItem(b)).join('')}</div>
      </div>`;
    }).join('');
  } else {
    // Group by year
    const groups={};
    books.forEach(b=>{
      const d=b.done||b.start;
      if(!d)return;
      const y=d.slice(0,4);
      if(!groups[y])groups[y]=[];
      groups[y].push(b);
    });
    const ys=Object.keys(groups).sort((a,b2)=>b2-a);
    if(!ys.length){body.innerHTML=`<div class="tl-empty">記録がありません。本に開始日・読了日を設定してください。</div>`;return;}
    body.innerHTML=ys.map(y=>{
      const list=groups[y];
      const pages=list.reduce((s,b)=>s+(b.pages||0),0);
      return`<div class="tl-group">
        <div class="tl-group-header">
          <div class="tl-group-title">${y}年</div>
          <span class="tl-group-count">${list.length}冊 · ${pages.toLocaleString()}p</span>
        </div>
        <div class="tl-list">${list.map(b=>tlItem(b)).join('')}</div>
      </div>`;
    }).join('');
  }
}

function tlItem(b){
  const coverHtml=b.cover
    ?`<img class="tl-thumb" src="${b.cover}" onerror="this.style.display='none'" loading="lazy">`
    :`<div class="tl-thumb-ph" style="background:${b.color}22;color:${b.color};">${b.title.slice(0,6)}</div>`;
  const starsHtml=b.rating>0?`<div class="tl-stars">${[...Array(5)].map((_,i)=>`<span class="tl-star ${i<b.rating?'f':'e'}">★</span>`).join('')}</div>`:'';
  const dateStr=b.done?`読了: ${b.done}`:(b.start?`開始: ${b.start}`:'');
  return`<div class="tl-item" onclick="openModal(${b.id})">
    ${coverHtml}
    <div class="tl-info">
      <div class="tl-title">${b.title}</div>
      <div class="tl-author">${b.author||'著者不明'}</div>
      <div class="tl-meta">
        <span class="genre-badge gb-${b.genre}" style="margin-bottom:0;">${b.genre}</span>
        ${b.pages?`<span class="tl-pages">${b.pages.toLocaleString()}p</span>`:''}
        ${dateStr?`<span class="tl-date">${dateStr}</span>`:''}
        ${starsHtml}
      </div>
    </div>
  </div>`;
}

initData();
</script>
